<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!-- aisia.club — lightbulb icon only (favicon / avatar) -->
  
  <g transform="translate(32, 30)">
    <!-- Bulb circle -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>
    
    <!-- Neck -->
    <line x1="-7" y1="14" x2="-5" y2="22" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="7" y1="14" x2="5" y2="22" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>
    
    <!-- Screw lines -->
    <line x1="-5" y1="24" x2="5" y2="24" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-4" y1="28" x2="4" y2="28" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-3" y1="32" x2="3" y2="32" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Spark rays -->
    <line x1="0" y1="-22" x2="0" y2="-30" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-9" y1="-20" x2="-14" y2="-27" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="9" y1="-20" x2="14" y2="-27" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-16" y1="-14" x2="-22" y2="-18" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="-14" x2="22" y2="-18" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>